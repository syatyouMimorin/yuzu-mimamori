<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ゆずちゃん見守りダッシュボード</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css?v=1.0.0">
</head>
<body>

<header>
  <h1>ゆずちゃん見守り</h1>
  <div id="clock"></div>
</header>

<div class="grid">
  <div class="card card-milk">
    <div class="card-label">ミルク</div>
    <div id="milk-content"><div class="no-data">データを読み込み中...</div></div>
  </div>
  <div class="card card-sleep">
    <div class="card-label">睡眠</div>
    <div id="sleep-content"><div class="no-data">データを読み込み中...</div></div>
  </div>
</div>

<footer>
  5分おきに自動更新
  <div id="status"></div>
</footer>

<script src="app.js?v=1.0.0"></script>
</body>
</html>

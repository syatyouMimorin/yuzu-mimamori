<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>赤ちゃん見守りダッシュボード</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #fdf8f3;
    --card: #ffffff;
    --text-primary: #1a1612;
    --text-secondary: #7a6f65;
    --text-muted: #b0a89f;
    --accent-milk: #e8773a;
    --accent-sleep: #4a7fa5;
    --ok: #5a8f5a;
    --ok-bg: #edf5ed;
    --warn: #b07a2a;
    --warn-bg: #fdf3e3;
    --danger: #b03a2a;
    --danger-bg: #fdecea;
    --border: #ede8e2;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text-primary);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem;
  }

  header {
    text-align: center;
    margin-bottom: 2.5rem;
  }

  header h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 2rem;
    font-weight: 400;
    color: var(--text-primary);
    letter-spacing: -0.01em;
  }

  #clock {
    font-size: 1rem;
    color: var(--text-secondary);
    margin-top: 0.4rem;
    font-weight: 300;
    letter-spacing: 0.05em;
  }

  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1.5rem;
    width: 100%;
    max-width: 720px;
  }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 2rem;
    position: relative;
    overflow: hidden;
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 4px;
  }

  .card-milk::before { background: var(--accent-milk); }
  .card-sleep::before { background: var(--accent-sleep); }

  .card-label {
    font-size: 0.75rem;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 1.5rem;
  }

  .section-label {
    font-size: 0.7rem;
    color: var(--text-muted);
    letter-spacing: 0.05em;
    margin-bottom: 0.25rem;
  }

  .time-display {
    font-family: 'DM Serif Display', serif;
    font-size: 3rem;
    font-weight: 400;
    line-height: 1;
    color: var(--text-primary);
  }

  .time-display.small {
    font-size: 2.2rem;
  }

  .sub-text {
    font-size: 0.85rem;
    color: var(--text-secondary);
    margin-top: 0.35rem;
    font-weight: 300;
  }

  .divider {
    border: none;
    border-top: 1px solid var(--border);
    margin: 1.25rem 0;
  }

  .badge {
    display: inline-block;
    font-size: 0.7rem;
    font-weight: 500;
    letter-spacing: 0.05em;
    padding: 4px 12px;
    border-radius: 100px;
    margin-top: 0.75rem;
  }

  .badge-ok { background: var(--ok-bg); color: var(--ok); }
  .badge-warn { background: var(--warn-bg); color: var(--warn); }
  .badge-danger { background: var(--danger-bg); color: var(--danger); }
  .badge-sleep { background: #e8f0f7; color: var(--accent-sleep); }

  .no-data {
    color: var(--text-muted);
    font-size: 0.9rem;
    font-weight: 300;
  }

  footer {
    margin-top: 2rem;
    font-size: 0.72rem;
    color: var(--text-muted);
    text-align: center;
    letter-spacing: 0.03em;
  }

  #status {
    margin-top: 0.5rem;
    font-size: 0.72rem;
    color: var(--text-muted);
  }

  @media (max-width: 560px) {
    .grid { grid-template-columns: 1fr; }
    .time-display { font-size: 2.5rem; }
  }
</style>
</head>
<body>

<header>
  <h1>ゆずちゃん見守り</h1>
  <div id="clock"></div>
</header>

<div class="grid">
  <div class="card card-milk">
    <div class="card-label">ミルク</div>
    <div id="milk-content"><div class="no-data">データを読み込み中...</div></div>
  </div>
  <div class="card card-sleep">
    <div class="card-label">睡眠</div>
    <div id="sleep-content"><div class="no-data">データを読み込み中...</div></div>
  </div>
</div>

<footer>
  5分おきに自動更新
  <div id="status"></div>
</footer>

<script>
  // =============================
  // 設定（変更する場合はここを編集）
  // =============================
  const FILE_ID  = '1WeV9hDxLZowNKexP-o9WtvOnWTySlm79';
  const API_KEY  = 'AIzaSyAdy7m2S2L7pflb05K_VJmlfD8MgQPXbwU';
  const FETCH_INTERVAL_MIN = 5;      // Driveからの取得間隔（分）
  const DISPLAY_UPDATE_SEC = 60;     // 画面更新間隔（秒）
  const NEXT_MILK_HOURS    = 3;      // 次の授乳までの目安時間（時間）
  // =============================

  let lastMilkTime = null;
  let lastSleepTime = null;
  let isSleeping = false;

  // 現在時刻を表示
  function updateClock() {
    const now = new Date();
    const h = String(now.getHours()).padStart(2,'0');
    const m = String(now.getMinutes()).padStart(2,'0');
    const days = ['日','月','火','水','木','金','土'];
    const day = days[now.getDay()];
    document.getElementById('clock').textContent =
      now.getFullYear() + '/' +
      String(now.getMonth()+1).padStart(2,'0') + '/' +
      String(now.getDate()).padStart(2,'0') + '（' + day + '） ' + h + ':' + m;
  }

  // Google DriveからテキストファイルをGET
  async function fetchFromDrive() {
    const url = `https://www.googleapis.com/drive/v3/files/${FILE_ID}?alt=media&key=${API_KEY}`;
    try {
      const res = await fetch(url);
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const text = await res.text();
      parsePiyolog(text);
      updateDisplay();
      document.getElementById('status').textContent =
        '最終取得: ' + new Date().toLocaleTimeString('ja-JP');
    } catch (e) {
      document.getElementById('status').textContent = '取得エラー: ' + e.message;
    }
  }

  // ぴよログテキストをパース
  function parsePiyolog(text) {
    lastMilkTime = null;
    lastSleepTime = null;
    isSleeping = false;

    const lines = text.split('\n').map(l => l.trim()).filter(l => l);

    // 日付を取得
    let baseDate = new Date();
    const dateMatch = text.match(/【ぴよログ】(\d{4})\/(\d{2})\/(\d{2})/);
    if (dateMatch) {
      baseDate = new Date(
        parseInt(dateMatch[1]),
        parseInt(dateMatch[2]) - 1,
        parseInt(dateMatch[3])
      );
    }

    let milkTimes  = [];
    let sleepTimes = [];
    let wakeTimes  = [];

    for (const line of lines) {
      // ミルク（行頭の時刻のみ使用）
      const milkMatch = line.match(/^(\d{1,2}):(\d{2})\s+ミルク/);
      if (milkMatch) {
        const d = new Date(baseDate);
        d.setHours(parseInt(milkMatch[1]), parseInt(milkMatch[2]), 0, 0);
        milkTimes.push(d);
      }
      // 寝る（行頭の時刻のみ使用・同行複数時刻は無視）
      const sleepMatch = line.match(/^(\d{1,2}):(\d{2})\s+寝る/);
      if (sleepMatch) {
        const d = new Date(baseDate);
        d.setHours(parseInt(sleepMatch[1]), parseInt(sleepMatch[2]), 0, 0);
        sleepTimes.push(d);
      }
      // 起きる
      const wakeMatch = line.match(/^(\d{1,2}):(\d{2})\s+起きる/);
      if (wakeMatch) {
        const d = new Date(baseDate);
        d.setHours(parseInt(wakeMatch[1]), parseInt(wakeMatch[2]), 0, 0);
        wakeTimes.push(d);
      }
    }

    if (milkTimes.length > 0) {
      lastMilkTime = milkTimes[milkTimes.length - 1];
    }

    const lastSleep = sleepTimes.length > 0 ? sleepTimes[sleepTimes.length - 1] : null;
    const lastWake  = wakeTimes.length  > 0 ? wakeTimes[wakeTimes.length - 1]   : null;

    if (lastSleep && (!lastWake || lastSleep > lastWake)) {
      isSleeping    = true;
      lastSleepTime = lastSleep;
    }
  }

  function fmt(date) {
    return String(date.getHours()).padStart(2,'0') + ':' + String(date.getMinutes()).padStart(2,'0');
  }

  function diffMin(a, b) {
    return Math.floor((b - a) / 60000);
  }

  function fmtDuration(minutes) {
    const abs = Math.abs(minutes);
    const h = Math.floor(abs / 60);
    const m = abs % 60;
    return h > 0 ? h + '時間' + m + '分' : m + '分';
  }

  // 画面を更新
  function updateDisplay() {
    const now = new Date();

    // ミルクカード
    const milkEl = document.getElementById('milk-content');
    if (lastMilkTime) {
      const nextMilk   = new Date(lastMilkTime.getTime() + NEXT_MILK_HOURS * 60 * 60 * 1000);
      const diffToNext = diffMin(now, nextMilk);
      const elapsed    = diffMin(lastMilkTime, now);

      let badge = '';
      let nextSub = '';
      if (diffToNext > 30) {
        badge   = '<span class="badge badge-ok">余裕あり</span>';
        nextSub = 'あと ' + fmtDuration(diffToNext);
      } else if (diffToNext > 0) {
        badge   = '<span class="badge badge-warn">もうすぐ</span>';
        nextSub = 'あと ' + fmtDuration(diffToNext);
      } else {
        badge   = '<span class="badge badge-danger">授乳の時間です</span>';
        nextSub = fmtDuration(diffToNext) + ' 超過';
      }

      milkEl.innerHTML =
        '<div class="section-label">最終授乳</div>' +
        '<div class="time-display">' + fmt(lastMilkTime) + '</div>' +
        '<div class="sub-text">' + fmtDuration(elapsed) + '前</div>' +
        '<hr class="divider">' +
        '<div class="section-label">次の授乳予定</div>' +
        '<div class="time-display small">' + fmt(nextMilk) + '</div>' +
        '<div class="sub-text">' + nextSub + '</div>' +
        badge;
    } else {
      milkEl.innerHTML = '<div class="no-data">記録が見つかりません</div>';
    }

    // 睡眠カード
    const sleepEl = document.getElementById('sleep-content');
    if (isSleeping && lastSleepTime) {
      const elapsed = diffMin(lastSleepTime, now);
      sleepEl.innerHTML =
        '<div class="section-label">就寝時刻</div>' +
        '<div class="time-display">' + fmt(lastSleepTime) + '</div>' +
        '<div class="sub-text">' + fmtDuration(elapsed) + ' 経過</div>' +
        '<span class="badge badge-sleep">就寝中</span>';
    } else {
      sleepEl.innerHTML =
        '<div class="section-label">状態</div>' +
        '<div class="time-display small" style="color:var(--text-secondary);">起きています</div>';
    }
  }

  // 初回実行
  updateClock();
  fetchFromDrive();

  // 時計は毎秒更新
  setInterval(updateClock, 1000);

  // 画面表示は1分おきに更新
  setInterval(updateDisplay, DISPLAY_UPDATE_SEC * 1000);

  // Driveからの取得は5分おき
  setInterval(fetchFromDrive, FETCH_INTERVAL_MIN * 60 * 1000);
</script>
</body>
</html>
